name: publish release

permissions:
  contents: write

on:
  push:
    tags:
      - '*' 
    paths:
      - "Flow.Launcher.Plugin.Tray/plugin.json"
  workflow_dispatch:

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 7.0.x

      - name: get version
        id: version
        uses: notiz-dev/github-action-json-property@release
        with:
          path: "Flow.Launcher.Plugin.Tray/plugin.json"
          prop_path: "Version"

      - name: print version
        run: echo ${{steps.version.outputs.prop}}
        
      - name: extract release notes
        id: extract-release-notes
        uses: ffurrer2/extract-release-notes@v2

      - name: print release notes
        run: echo '${{ steps.extract-release-notes.outputs.release_notes }}'

      - name: restore dependencies
        run: |
          cd Flow.Launcher.Plugin.Tray
          dotnet restore

      - name: build
        run: |
          cd Flow.Launcher.Plugin.Tray
          dotnet publish -c Release -r win-x64 --no-self-contained Flow.Launcher.Plugin.Tray.csproj
          7z a -tzip "Flow.Launcher.Plugin.Tray.zip" "./bin/Release/win-x64/publish/*"

      - name: publish
        uses: softprops/action-gh-release@v2
        with:
          body: '${{ steps.extract-release-notes.outputs.release_notes }}'
          files: "Flow.Launcher.Plugin.Tray/Flow.Launcher.Plugin.Tray.zip"
          tag_name: "v${{steps.version.outputs.prop}}"